<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshLife Parfum v4.2 | Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #1a3a2a;
            --accent: #d4af37;
            --dark: #111111;
            --light: #f9f9f9;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--light); color: var(--dark); overflow-x: hidden; padding-top: 90px; }
        h1, h2, h3, .brand-logo { font-family: 'Playfair Display', serif; }

        header {
            background: rgba(26, 58, 42, 0.95); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; left: 0; z-index: 1000;
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .brand-logo { color: #fff; font-size: 24px; font-weight: 700; text-decoration: none; letter-spacing: 1px; }
        .brand-logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 25px; color: #fff; font-size: 20px; align-items: center; }
        .nav-icons i { cursor: pointer; transition: var(--transition); position: relative; }
        .nav-icons i:hover { color: var(--accent); }
        
        #cart-count {
            position: absolute; top: -10px; right: -12px;
            background: var(--accent); color: var(--primary);
            font-size: 11px; font-weight: 700; width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .admin-toggle { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 6px 14px; cursor: pointer; border-radius: 5px; font-size: 13px; font-weight: 600;
            transition: var(--transition);
        }
        .admin-toggle:hover { background: var(--accent); color: var(--primary); }

        .admin-panel { 
            background: #fff; padding: 30px; margin: 20px 5%; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; border-left: 5px solid var(--accent); 
        }
        .admin-panel h3 { margin-bottom: 15px; color: var(--primary); }
        .admin-panel .admin-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; align-items: end; }
        .admin-form input, .admin-form select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; }
        .admin-form button { background: var(--primary); color: #fff; border: none; padding: 13px; cursor: pointer; border-radius: 6px; font-weight: 600; transition: var(--transition); grid-column: 1 / -1; }
        .admin-form button:hover { background: var(--accent); color: var(--primary); }

        .hero {
            height: 40vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; padding: 0 20px;
        }
        .hero-content h1 { font-size: 3rem; margin-bottom: 15px; letter-spacing: 2px; }
        .hero-content p { font-size: 1.1rem; font-weight: 300; color: #f0f0f0; }

        .products { padding: 60px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 40px; color: var(--primary); position: relative; }
        .section-title::after { content: ''; display: block; width: 50px; height: 3px; background: var(--accent); margin: 10px auto 0; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02); transition: var(--transition); display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .product-img-box { height: 340px; background: #eee; position: relative; overflow: hidden; }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .product-card:hover .product-img-box img { transform: scale(1.05); }
        .product-info { padding: 25px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-category { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        .product-title { font-size: 19px; margin-bottom: 12px; color: var(--dark); font-weight: 600; }
        .product-stock { font-size: 13px; color: #555; background: #f0f3f1; padding: 6px 10px; border-radius: 6px; margin-bottom: 15px; border-left: 3px solid var(--primary); text-align: left; }
        .product-price { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        
        .btn-add-to-cart { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-add-to-cart:hover { background: var(--accent); color: var(--primary); }

        .cart-section { background: #fff; margin: 40px 5%; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; border-top: 4px solid var(--primary); }
        .cart-title { font-size: 22px; margin-bottom: 20px; color: var(--primary); border-bottom: 2px solid var(--light); padding-bottom: 10px; font-weight: 700; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item-details h4 { font-size: 16px; color: var(--dark); }
        .cart-item-details p { color: var(--accent); font-weight: 600; margin-top: 4px; }
        .remove-item { color: #ff4d4d; cursor: pointer; background: none; border: none; font-size: 18px; transition: var(--transition); }
        .cart-total { text-align: right; font-size: 22px; font-weight: 700; margin: 20px 0; color: var(--primary); }
        
        .order-box { max-width: 450px; background: var(--light); padding: 25px; border-radius: 10px; margin-top: 20px; }
        .order-box h4 { margin-bottom: 15px; color: var(--primary); }
        .order-box .order-form { display: grid; gap: 15px; }
        .order-form input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-order { background: #25D366; color: #fff; padding: 14px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 16px; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-order:hover { background: #1ebd58; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        footer { background: var(--dark); color: #aaa; padding: 40px 5%; text-align: center; margin-top: 80px; font-size: 14px; border-top: 3px solid var(--accent); }
        footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-logo">FreshLife<span>.</span></a>
        <div class="nav-icons">
            <button class="admin-toggle" onclick="loginAdmin()"><i class="fas fa-user-shield"></i> Админ</button>
            <i class="fas fa-shopping-bag" onclick="scrollToCart()">
                <span id="cart-count">0</span>
            </i>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>FreshLife Parfum 2.0</h1>
            <p>Премиальная парфюмерия в облачной базе данных</p>
        </div>
    </section>

    <section class="admin-panel" id="adminPanel">
        <h3><i class="fas fa-plus-circle"></i> Добавление нового товара</h3>
        <div class="admin-form">
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Фотография парфюма:</label>
                <input type="file" id="prodImage" accept="image/*">
            </div>
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Название товара:</label>
                <input type="text" id="prodTitle" placeholder="Например: Elysian Fresh v2.0">
            </div>
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Категория:</label>
                <select id="prodCat">
                    <option value="Unisex">Unisex</option>
                    <option value="For Her">For Her</option>
                    <option value="For Him">For Him</option>
                </select>
            </div>
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Кол-во коробок:</label>
                <input type="number" id="prodBoxes" value="0" min="0" oninput="updateAdminTotalPcs()">
            </div>
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Штук в 1 коробке:</label>
                <input type="number" id="prodPcsPerBox" value="0" min="0" oninput="updateAdminTotalPcs()">
            </div>
            <div>
                <label style="font-size:12px; display:block; margin-bottom:5px; color:#666;">Цена (в сомони):</label>
                <input type="number" id="prodPrice" placeholder="Цена в TJS">
            </div>
            <div style="grid-column: 1 / -1; margin-top: 5px; font-weight: 600; color: var(--primary); font-size: 14px;" id="adminTotalDisplay">
                Итого штук будет добавлено: 0 шт.
            </div>
            <button id="addBtn" onclick="addNewProduct()">Добавить товар</button>
        </div>
    </section>

    <section class="products">
        <h2 class="section-title">Каталог Магазина</h2>
        <div class="product-grid" id="catalogGrid"></div>
    </section>

    <section class="cart-section" id="cartSection">
        <div class="cart-title"><i class="fas fa-shopping-basket"></i> Ваша корзина</div>
        <div id="cartItemsContainer"></div>
        <div class="cart-total" id="cartTotalSum">Итого: 0 TJS</div>

        <div class="order-box">
            <h4>Оформление заказа:</h4>
            <div class="order-form">
                <input type="text" id="buyerName" placeholder="Ваше имя" required>
                <input type="tel" id="buyerPhone" placeholder="Номер телефона (+992...)" required>
                <button class="btn-order" onclick="sendOrderToTelegram()">
                    <i class="fab fa-telegram-plane"></i> Оформить заказ
                </button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 FreshLife Parfum v2.0. Связь через WhatsApp: <a href="https://wa.me/992100011209" target="_blank">+992 10 001 1209</a></p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://bkrxtujthsdejsnemqdf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrcnh0dWp0aHNkZWpzbmVtcWRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTUzODMsImV4cCI6MjA5NzAzMTM4M30.1zSIniM-f-z4ZzEgwOX3bLK4B1A1BMNs8ZpPDumzW_Y';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TELEGRAM_BOT_TOKEN = '8673017660:AAH_ghD8wO9tOGRKzOLwcFBJr1L5sr7beRM'; 
        const TELEGRAM_CHAT_ID = '7780614523'; 

        let products = [];
        let cart = [];
        let isAdminLoggedIn = false;

        function updateAdminTotalPcs() {
            const boxes = parseInt(document.getElementById('prodBoxes').value) || 0;
            const pcs = parseInt(document.getElementById('prodPcsPerBox').value) || 0;
            document.getElementById('adminTotalDisplay').innerText = `Итого штук будет добавлено: ${boxes * pcs} шт.`;
        }

        function loginAdmin() {
            if (isAdminLoggedIn) {
                const panel = document.getElementById('adminPanel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                return;
            }
            const username = prompt("Введите имя Администратора (Логин):");
            const password = prompt("Введите код Администратора (Пароль):");

            if (username === "admin" && password === "110109") {
                isAdminLoggedIn = true;
                document.getElementById('adminPanel').style.display = 'block';
                alert("Добро пожаловать, Админ!");
            } else {
                alert("Неверный логин или пароль!");
            }
        }

        async function loadProductsFromCloud() {
            const grid = document.getElementById('catalogGrid');
            try {
                let { data, error } = await _supabase.from('perfumes').select('*').order('id', { ascending: false });
                if (error) throw error;
                products = data || [];
                renderCatalog();
            } catch (err) {
                console.error("Ошибка загрузки данных из Supabase:", err);
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:red; padding: 40px 0;">Ошибка подключения к облаку. Проверьте RLS политики.</p>`;
            }
        }

        function addNewProduct() {
            const titleInput = document.getElementById('prodTitle');
            const catInput = document.getElementById('prodCat');
            const priceInput = document.getElementById('prodPrice');
            const boxesInput = document.getElementById('prodBoxes');
            const pcsInput = document.getElementById('prodPcsPerBox');
            const fileInput = document.getElementById('prodImage');
            const btn = document.getElementById('addBtn');

            const title = titleInput.value.trim();
            const category = catInput.value;
            
            // ИСПРАВЛЕНО: Строгие преобразования типов данных text -> number
            const price = parseFloat(priceInput.value) || 0;
            const boxes = parseInt(boxesInput.value) || 0;
            const pcs_per_box = parseInt(pcsInput.value) || 0;

            if(!title || !priceInput.value.trim()) {
                alert("Пожалуйста, заполните название и цену товара!");
                return;
            }

            btn.innerText = "Сохранение в облако...";
            btn.disabled = true;

            const defaultImg = "https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=500&q=80";

            if (fileInput.files && fileInput.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let imgEl = new Image();
                    imgEl.onload = function() {
                        let canvas = document.createElement('canvas');
                        let ctx = canvas.getContext('2d');
                        let max_size = 400;
                        let width = imgEl.width;
                        let height = imgEl.height;

                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(imgEl, 0, 0, width, height);
                        
                        let compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        saveProductToSupabase(title, category, price, boxes, pcs_per_box, compressedDataUrl);
                    };
                    imgEl.onerror = function() { saveProductToSupabase(title, category, price, boxes, pcs_per_box, defaultImg); };
                    imgEl.src = e.target.result;
                };
                reader.onerror = function() { saveProductToSupabase(title, category, price, boxes, pcs_per_box, defaultImg); };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveProductToSupabase(title, category, price, boxes, pcs_per_box, defaultImg);
            }
        }

        async function saveProductToSupabase(title, category, price, boxes, pcs_per_box, imageSrc) {
            const btn = document.getElementById('addBtn');
            try {
                // ИСПРАВЛЕНО: Теперь в базу данных улетают чистые типы int и float вместо строк
                const { data, error } = await _supabase.from('perfumes').insert([
                    { 
                        name: title, 
                        description: category, 
                        price: price, 
                        image_url: imageSrc,
                        boxes_count: boxes,
                        pcs_per_box: pcs_per_box
                    }
                ]);
                
                if (error) throw error;

                // Очистка формы после успешного добавления
                document.getElementById('prodTitle').value = "";
                document.getElementById('prodPrice').value = "";
                document.getElementById('prodImage').value = "";
                document.getElementById('prodBoxes').value = "0";
                document.getElementById('prodPcsPerBox').value = "0";
                document.getElementById('adminTotalDisplay').innerText = "Итого штук будет добавлено: 0 шт.";

                alert("Товар успешно сохранен в облачную базу данных!");
                await loadProductsFromCloud(); 
            } catch (err) {
                console.error("Ошибка сохранения в Supabase:", err);
                alert(`Не удалось сохранить в облако.\nПричина: ${err.message || 'Ошибка структуры данных'}`);
            } finally {
                btn.innerText = "Добавить товар";
                btn.disabled = false;
            }
        }

        function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            if(products.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#888; padding: 40px 0;">Каталог пуст. Товаров в базе пока нет.</p>`;
                return;
            }
            grid.innerHTML = products.map(p => {
                const totalPcs = (parseInt(p.boxes_count) || 0) * (parseInt(p.pcs_per_box) || 0);
                return `
                <div class="product-card">
                    <div class="product-img-box">
                        <img src="${p.image_url || 'https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=500&q=80'}" alt="${p.name || ''}">
                    </div>
                    <div class="product-info">
                        <div>
                            <div class="product-category">${p.description || 'Unisex'}</div>
                            <h3 class="product-title">${p.name || 'Без названия'}</h3>
                            <div class="product-stock">
                                <i class="fas fa-box"></i> В наличии: <b>${p.boxes_count || 0}</b> - кор. (по ${p.pcs_per_box || 0} шт.)<br>
                                <i class="fas fa-layer-group"></i> Общий остаток: <b>${totalPcs}</b> шт.
                            </div>
                        </div>
                        <div>
                            <div class="product-price">${p.price || 0} TJS</div>
                            <button class="btn-add-to-cart" onclick="addToCart(${p.id})">В корзину</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            if (item) {
                cart.push(item);
                updateCartUI();
                document.getElementById('cartSection').style.display = 'block';
            }
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cartItemsContainer');
            
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-details">
                        <h4>${item.name || 'Парфюм'}</h4>
                        <p>${item.price || 0} TJS</p>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${index})"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            document.getElementById('cartTotalSum').innerText = `Итого: ${total} TJS`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
            if(cart.length === 0) document.getElementById('cartSection').style.display = 'none';
        }

        function scrollToCart() {
            if(cart.length > 0) {
                document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Ваша корзина пуста!");
            }
        }

        function sendOrderToTelegram() {
            const name = document.getElementById('buyerName').value;
            const phone = document.getElementById('buyerPhone').value;

            if(!name || !phone) {
                alert("Пожалуйста, заполните поля формы!");
                return;
            }

            let totalSum = cart.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            let message = `🔔 **НОВЫЙ ЗАКАЗ [FreshLife 2.0]**\n\n👤 **Покупатель:** ${name}\n📞 **Телефон:** ${phone}\n\n📦 **Товары:**\n`;
            
            cart.forEach((item, i) => { message += `${i+1}. ${item.name} — ${item.price} TJS\n`; });
            message += `\n💰 **Сумма заказа:** ${totalSum} TJS`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
            })
            .then(response => {
                if(response.ok) {
                    alert("Спасибо! Заказ принят!");
                    cart = [];
                    updateCartUI();
                    document.getElementById('cartSection').style.display = 'none';
                    document.getElementById('buyerName').value = "";
                    document.getElementById('buyerPhone').value = "";
                } else {
                    alert("Ошибка отправки заказа.");
                }
            })
            .catch(err => { console.error(err); alert("Ошибка сети."); });
        }

        // Автоматический старт загрузки данных при открытии страницы
        loadProductsFromCloud();
    </script>
</body>
</html>
